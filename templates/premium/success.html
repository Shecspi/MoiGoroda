{% extends 'base.html' %}

{% block content %}
<div class="w-full">

    <h1 class="text-3xl sm:text-4xl font-semibold text-gray-900 dark:text-white">
      Спасибо за оформление премиум-подписки!
    </h1>
    <p class="mt-4 text-base text-gray-600 dark:text-neutral-300">
      Ваша поддержка помогает развивать «Мои города».

      Реклама на сайте для вас больше не будет отображаться после активации подписки.

    <div class="mt-8">
      <a href="{% url 'main_page' %}"
