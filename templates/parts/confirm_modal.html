{# Универсальное окно подтверждения (Preline HSOverlay). Тексты задаются из JS: openConfirmModal() #}
<div id="confirm-action-modal"
     class="hs-overlay hidden size-full fixed top-0 start-0 z-[1060] overflow-x-hidden overflow-y-auto pointer-events-none flex items-center justify-center"
     role="dialog"
     tabindex="-1"
     aria-labelledby="confirm-action-modal-title"
     aria-modal="true">
    <div class="hs-overlay-animation-target hs-overlay-open:mt-7 hs-overlay-open:opacity-100 hs-overlay-open:duration-500 mt-0 opacity-0 ease-out transition-all sm:max-w-lg sm:w-full m-3 sm:mx-auto">
        <div class="max-h-full overflow-hidden flex flex-col bg-white border border-gray-200 shadow-2xs rounded-xl pointer-events-auto dark:bg-neutral-800 dark:border-neutral-700 dark:shadow-neutral-700/70">
            <div class="flex justify-between items-center py-3 px-4 border-b dark:border-neutral-700">
                <h3 class="font-bold text-gray-800 dark:text-white" id="confirm-action-modal-title">
                    Подтверждение
                </h3>
                <button type="button"
                        class="flex justify-center items-center size-7 text-sm font-semibold rounded-full border border-transparent text-gray-800 hover:bg-gray-100 disabled:opacity-50 disabled:pointer-events-none dark:text-neutral-200 dark:hover:bg-neutral-700 dark:focus:outline-none dark:focus:ring-1 dark:focus:ring-gray-600"
                        data-hs-overlay="#confirm-action-modal"
                        aria-label="Закрыть">
                    <span class="sr-only">Закрыть</span>
                    <svg class="flex-shrink-0 size-4" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="m18 6-12 12"></path>
                        <path d="m6 6 12 12"></path>
                    </svg>
                </button>
            </div>
            <div class="flex-1 overflow-y-auto p-4">
                <p class="text-sm text-gray-800 dark:text-white" id="confirm-action-modal-message"></p>
            </div>
            <div class="flex items-center justify-end gap-x-2 py-3 px-4 border-t border-gray-200 dark:border-neutral-700 shrink-0">
                <button type="button"
                        id="confirm-action-modal-cancel"
                        class="btn btn-secondary btn-sm disabled:opacity-50 disabled:pointer-events-none"
                        data-hs-overlay="#confirm-action-modal">
                    Отмена
                </button>
                <button type="button"
                        id="confirm-action-modal-accept"
                        class="btn btn-red btn-sm disabled:opacity-50 disabled:pointer-events-none">
                    Подтвердить
                </button>
            </div>
        </div>
    </div>
</div>
