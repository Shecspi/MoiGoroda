<div class="col-span-1">
    <label for="id_date_of_visit" class="mb-2 block text-sm font-semibold text-gray-800 dark:text-neutral-300">
        Дата посещения
        {% if form.date_of_visit.field.required %}<span class="text-red-600 dark:text-red-500">*</span>{% endif %}
    </label>
    <div class="z-10 overflow-visible">
        <div class="relative">
            <span class="pointer-events-none absolute left-4 top-1/2 z-10 -translate-y-1/2 text-gray-500 dark:text-neutral-400" aria-hidden="true">
                <svg class="size-5 shrink-0" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M6.75 3v2.25M17.25 3v2.25M3 18.75V7.5a2.25 2.25 0 0 1 2.25-2.25h13.5A2.25 2.25 0 0 1 21 7.5v11.25m-18 0A2.25 2.25 0 0 0 5.25 21h13.5a2.25 2.25 0 0 0 2.25-2.25m-18 0v-7.5A2.25 2.25 0 0 1 5.25 9h13.5a2.25 2.25 0 0 1 2.25 2.25v7.5"/>
                </svg>
            </span>
            <input type="text"
                   name="date_of_visit"
                   value="{% if form.date_of_visit.value %}{{ form.date_of_visit.value|date:'d.m.Y' }}{% endif %}"
                   class="form-input form-input-date form-input-date--with-shortcuts {% if not form.date_of_visit.value %}form-input-date-empty{% endif %} {% if form.date_of_visit.errors %}border-red-500 dark:border-red-500{% endif %}"
                   placeholder="дд.мм.гггг"
                   id="id_date_of_visit"
                   autocomplete="off"
                   readonly
                   data-visit-date-picker
                   data-visit-date-min="1900-01-01"
                   data-visit-date-max="2470-12-31">
            <div class="absolute end-1.5 top-1/2 z-20 flex -translate-y-1/2 items-center gap-1">
                <button type="button"
                        id="yesterday-button"
                        class="btn btn-xs btn-outline-primary shrink-0">
                    Вчера
                </button>
                <button type="button"
                        id="today-button"
                        class="btn btn-xs btn-outline-teal shrink-0">
                    Сегодня
                </button>
            </div>
        </div>
    </div>
    {% if form.date_of_visit.help_text %}
        <p class="mt-1 text-sm text-gray-600 dark:text-neutral-500">
            {{ form.date_of_visit.help_text }}
        </p>
    {% endif %}
    {% if form.date_of_visit.errors %}
        <div class="mt-2 text-xs text-red-600 dark:text-red-500">
            {{ form.date_of_visit.errors }}
        </div>
    {% endif %}
</div>
