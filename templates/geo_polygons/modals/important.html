<div id="geo-polygons-important-modal"

     role="dialog"
     tabindex="-1"
     aria-labelledby="geo-polygons-important-modal-label">
    <div class="hs-overlay-animation-target !mt-0 hs-overlay-open:!mt-0 hs-overlay-open:opacity-100 hs-overlay-open:duration-500 opacity-0 ease-out transition-all sm:max-w-lg sm:w-full w-full"
         style="margin-top: 0 !important;">
        <div class="flex flex-col max-h-[calc(100dvh-3rem)] sm:max-h-[calc(100dvh-4rem)] overflow-hidden bg-white border shadow-sm rounded-xl pointer-events-auto dark:bg-neutral-800 dark:border-neutral-700">
            <div class="flex justify-between items-center py-3 px-4 border-b border-amber-900 dark:border-amber-200">
                <h3 class="font-bold text-amber-900 dark:text-amber-200 flex items-center gap-2" id="geo-polygons-important-modal-label">
                    <svg class="size-5 shrink-0" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" aria-hidden="true">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M12 9v3.75m-9.303 3.376c-.866 1.5.217 3.374 1.948 3.374h14.71c1.73 0 2.813-1.874 1.948-3.374L13.949 3.378c-.866-1.5-3.032-1.5-3.898 0L2.697 16.126zM12 15.75h.007v.008H12v-.008z"/>
                    </svg>
                    Важно!
                </h3>
                <button type="button"
                        class="btn btn-ghost-secondary"
                        data-hs-overlay="#geo-polygons-important-modal">
                    <span class="sr-only">Закрыть</span>
                    <svg class="flex-shrink-0 size-4" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                        <path d="m18 6-12 12"></path>
                        <path d="m6 6 12 12"></path>
                    </svg>
                </button>
            </div>

            <div class="p-4 overflow-y-auto min-h-0 flex-1 text-gray-800 dark:text-neutral-400 space-y-4">
                {% include 'help/partials/osm_polygons_territories.html' %}
            </div>

            <div class="flex flex-col gap-2 border-t dark:border-neutral-700 py-3 px-4 sm:flex-row sm:items-center sm:justify-between">
                <a href="{% url 'help-osm-polygons' %}"
                   class="text-sm text-blue-600 hover:text-blue-800 underline dark:text-blue-400 dark:hover:text-blue-300">
                    Полная версия в справке
                </a>
                <button type="button"
                        class="btn btn-sm btn-outline-secondary sm:shrink-0"
                        data-hs-overlay="#geo-polygons-important-modal">
                    Закрыть
                </button>
            </div>
        </div>
    </div>
</div>
