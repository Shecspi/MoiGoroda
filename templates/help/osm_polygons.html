{% extends 'base.html' %}

{% block content %}
    <div class="w-full px-3 py-10">
        <header class="mx-auto mb-6 max-w-4xl" id="block-page_header">
            <h1 class="mb-6 flex items-end justify-center text-center text-3xl font-bold tracking-tight text-gray-900 sm:text-4xl lg:text-5xl dark:text-white">
                Полигоны OpenStreetMap
            </h1>

            <nav aria-label="Хлебные крошки" class="flex justify-center">
                <ol class="flex flex-wrap items-center justify-center whitespace-nowrap border-y border-gray-200 py-2 text-sm dark:border-neutral-700">
                    <li class="inline-flex items-center font-semibold text-gray-900 dark:text-white">
                        <a class="flex items-center text-gray-600 hover:text-blue-600 focus:outline-none focus:text-blue-600 dark:text-neutral-400 dark:hover:text-blue-400 dark:focus:text-blue-400"
                           href="{% url 'help-index' %}">
                            <svg class="mr-2 size-4 shrink-0" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
                                <polyline points="14 2 14 8 20 8"/>
                                <line x1="16" x2="8" y1="13" y2="13"/>
                                <line x1="16" x2="8" y1="17" y2="17"/>
                                <line x1="10" x2="8" y1="9" y2="9"/>
                            </svg>
                            Справка
                        </a>
                    </li>
                </ol>
            </nav>
        </header>

        <section class="mx-auto max-w-4xl space-y-6">
            <div class="rounded-2xl border border-gray-200 bg-white p-6 shadow-sm sm:p-8 dark:border-neutral-700 dark:bg-neutral-800">
                <div class="mb-6 flex flex-col gap-3 sm:flex-row sm:items-center sm:justify-between">
                    <p class="text-sm text-gray-600 dark:text-neutral-400">
                        Инструкция по работе с картой полигонов на сайте.
                    </p>
                    <a href="{% url 'geo-polygons' %}"
                       class="btn btn-solid-primary btn-default shrink-0 justify-center sm:w-auto">
                        Открыть инструмент
                    </a>
                </div>

                <div class="space-y-6 text-sm leading-relaxed text-gray-700 dark:text-neutral-300 sm:text-base">
                    {% include 'help/partials/osm_polygons_usage.html' %}
                </div>
            </div>

            <div class="rounded-2xl border border-amber-900/40 bg-amber-50/50 p-6 shadow-sm sm:p-8 dark:border-amber-200/30 dark:bg-amber-500/5">
                <h2 class="mb-4 flex items-center gap-2 text-base font-semibold text-amber-900 dark:text-amber-200 sm:text-lg">
                    <svg class="size-5 shrink-0" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" aria-hidden="true">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M12 9v3.75m-9.303 3.376c-.866 1.5.217 3.374 1.948 3.374h14.71c1.73 0 2.813-1.874 1.948-3.374L13.949 3.378c-.866-1.5-3.032-1.5-3.898 0L2.697 16.126zM12 15.75h.007v.008H12v-.008z"/>
                    </svg>
                    Важно!
                </h2>
                <div class="space-y-4 text-sm leading-relaxed text-gray-800 dark:text-neutral-300 sm:text-base">
                    {% include 'help/partials/osm_polygons_territories.html' %}
                </div>
            </div>
        </section>
    </div>
{% endblock %}
