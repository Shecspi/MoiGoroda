{% extends 'base.html' %}

{% block content %}
<div class="mx-auto max-w-5xl px-4 pb-8 pt-12 sm:px-6 sm:pt-14 lg:px-8">
    {% include 'ui_demo/_subnav.html' %}

    <h1 class="mb-8 text-3xl font-bold text-gray-900 dark:text-white">Поля форм</h1>

    <section class="mb-10 max-w-xl space-y-4">
        <h2 class="text-lg font-semibold text-gray-900 dark:text-white">form-input</h2>
        <div>
            <label for="demo-input" class="mb-1 block text-sm font-medium text-gray-700 dark:text-neutral-300">Текст</label>
            <input id="demo-input" type="text" class="form-input" placeholder="Placeholder" autocomplete="off">
        </div>
        <div>
            <label for="demo-input-dis" class="mb-1 block text-sm font-medium text-gray-700 dark:text-neutral-300">Disabled</label>
            <input id="demo-input-dis" type="text" class="form-input" value="Недоступно" disabled>
        </div>
    </section>

    <section class="mb-10 max-w-xl space-y-4">
        <h2 class="text-lg font-semibold text-gray-900 dark:text-white">form-select</h2>
        <div>
            <label for="demo-select" class="mb-1 block text-sm font-medium text-gray-700 dark:text-neutral-300">Выбор</label>
            <select id="demo-select" class="form-select dark:bg-neutral-900 dark:border-neutral-700 dark:text-neutral-100">
                <option>Первый</option>
                <option>Второй</option>
                <option>Третий</option>
            </select>
        </div>
    </section>

    <section class="mb-10 max-w-xl space-y-4">
        <h2 class="text-lg font-semibold text-gray-900 dark:text-white">mg-select-search</h2>
        <div>
            <label for="demo-hs-select" class="mb-1 block text-sm font-medium text-gray-700 dark:text-neutral-300">Выбор с поиском</label>
            <select
                id="demo-hs-select"
                class="hidden"
                data-hs-select='{
                    "hasSearch": true,
                    "searchPlaceholder": "Поиск...",
                    "searchClasses": "mg-select-search",
                    "searchWrapperClasses": "mg-select-search-wrap",
                    "placeholder": "Выберите значение",
                    "toggleTag": "<button type=\"button\" aria-expanded=\"false\"><span class=\"text-gray-800 dark:text-neutral-200 truncate\" data-title></span></button>",
                    "toggleClasses": "mg-select-toggle",
                    "dropdownClasses": "mg-select-dropdown z-20",
                    "optionClasses": "mg-select-option",
                    "optionTemplate": "<div class=\"flex items-center\"><div class=\"me-2\" data-icon></div><div><div class=\"text-sm text-gray-800 dark:text-neutral-200\" data-title></div></div><div class=\"ms-auto\"><span class=\"hidden\"><svg class=\"shrink-0 size-4 text-blue-600 dark:text-blue-500\" xmlns=\"http://www.w3.org/2000/svg\" width=\"16\" height=\"16\" fill=\"currentColor\" viewBox=\"0 0 16 16\"><path d=\"M12.736 3.97a.733.733 0 0 1 1.047 0c.286.289.29.756.01 1.05L7.88 12.01a.733.733 0 0 1-1.065.02L3.217 8.384a.757.757 0 0 1 0-1.06.733.733 0 0 1 1.047 0l3.052 3.093 5.4-6.425a.247.247 0 0 1 .02-.022Z\"/></svg></span></div></div>",
                    "extraMarkup": "<div class=\"absolute top-1/2 end-3 -translate-y-1/2\"><svg class=\"shrink-0 size-3.5 text-gray-500 dark:text-neutral-500\" xmlns=\"http://www.w3.org/2000/svg\" width=\"24\" height=\"24\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"m7 15 5 5 5-5\"/><path d=\"m7 9 5-5 5 5\"/></svg></div>"
                }'>
                <option value="">Выберите значение</option>
                <option value="1">Первый</option>
                <option value="2">Второй</option>
                <option value="3">Третий</option>
            </select>
        </div>
    </section>

    <section class="mb-10 max-w-xl space-y-4">
        <h2 class="text-lg font-semibold text-gray-900 dark:text-white">color-picker</h2>
        <div>
            <label for="demo-color" class="mb-1 block text-sm font-medium text-gray-700 dark:text-neutral-300">Цвет</label>
            <input id="demo-color" type="color" class="color-picker dark:bg-neutral-900 dark:border-neutral-600" value="#2563eb" title="Выбор цвета">
        </div>
    </section>
</div>
{% endblock %}
