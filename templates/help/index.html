{% extends 'base.html' %}

{% block content %}
    <div class="w-full px-3 py-10">
        <header class="mx-auto mb-6 max-w-4xl" id="block-page_header">
            <h1 class="mb-6 flex items-end justify-center text-3xl font-bold tracking-tight text-gray-900 sm:text-4xl lg:text-5xl dark:text-white">
                Справка
            </h1>
        </header>

        <div class="mx-auto max-w-4xl rounded-xl border border-gray-200 bg-white p-6 shadow-sm dark:border-neutral-700 dark:bg-neutral-900">
            <h2 class="mb-4 text-xl font-semibold text-gray-900 dark:text-white">
                Все статьи справки
            </h2>
            <div class="space-y-3">
                {% for article in help_articles %}
                    <article class="rounded-lg border border-gray-200 bg-gray-50/60 p-4 transition hover:border-blue-300 dark:border-neutral-700 dark:bg-neutral-800/70 dark:hover:border-blue-500/60">
                        <h3 class="text-base font-semibold text-gray-900 dark:text-white">
                            <a href="{{ article.url }}"
                               class="text-blue-600 transition hover:text-blue-700 hover:underline dark:text-blue-400 dark:hover:text-blue-300">
                                {{ article.title }}
                            </a>
                        </h3>
                        <p class="mt-1 text-sm text-gray-600 dark:text-neutral-400">
                            {{ article.description }}
                        </p>
                    </article>
                {% endfor %}
            </div>
        </div>
    </div>
{% endblock %}
