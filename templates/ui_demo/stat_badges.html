{% extends 'base.html' %}

{% block content %}
<div class="mx-auto max-w-5xl px-4 pb-8 pt-12 sm:px-6 sm:pt-14 lg:px-8">

    <h1 class="mb-8 text-3xl font-bold text-gray-900 dark:text-white">Статистические бейджи</h1>
    <p class="mb-8 text-sm text-gray-600 dark:text-neutral-400">Классы <span class="font-mono text-xs">stat-badge</span> + модификатор варианта.</p>

        </span>
        <span class="stat-badge stat-badge-primary">

        </span>
        <span class="stat-badge stat-badge-danger">

        </span>
    </div>
</div>
