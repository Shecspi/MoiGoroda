{% load mathfilters %}
<div class="flex items-center {{ gap_class|default:'gap-0.5' }}">
    {% for i in "12345"|make_list %}
        {% with index=forloop.counter %}
            {% if rating >= index %}
                <svg xmlns="http://www.w3.org/2000/svg" class="{{ size_class|default:'size-4' }} text-yellow-400" viewBox="0 0 576 512" fill="currentColor" aria-hidden="true">
                    <path d="M287.9 0c9.2 0 17.6 5.2 21.6 13.5l68.6 141.3 153.2 22.6c9 1.3 16.5 7.6 19.3 16.3s.5 18.1-5.9 24.5L433.6 328.4l26.2 155.6c1.5 9-2.2 18.1-9.6 23.5s-17.3 6-25.3 1.7l-137-73.2L151 509.1c-8.1 4.3-17.9 3.7-25.3-1.7s-11.2-14.5-9.7-23.5l26.2-155.6L31.1 218.2c-6.5-6.4-8.7-15.9-5.9-24.5s10.3-14.9 19.3-16.3l153.2-22.6L266.3 13.5C270.4 5.2 278.7 0 287.9 0z"/>
                </svg>
            {% elif rating >= index|sub:0.5 %}
                <svg xmlns="http://www.w3.org/2000/svg" class="{{ size_class|default:'size-4' }} text-yellow-400" viewBox="0 0 576 512" aria-hidden="true">
                    <defs>
                        <linearGradient id="star-rating-half-{{ star_id_prefix }}-{{ forloop.counter0 }}" x1="0" y1="0" x2="1" y2="0">
                            <stop offset="50%" stop-color="currentColor"/>
                            <stop offset="50%" stop-color="transparent"/>
                        </linearGradient>
                    </defs>
                    <path class="fill-gray-300 dark:fill-neutral-600" d="M287.9 0c9.2 0 17.6 5.2 21.6 13.5l68.6 141.3 153.2 22.6c9 1.3 16.5 7.6 19.3 16.3s.5 18.1-5.9 24.5L433.6 328.4l26.2 155.6c1.5 9-2.2 18.1-9.6 23.5s-17.3 6-25.3 1.7l-137-73.2L151 509.1c-8.1 4.3-17.9 3.7-25.3-1.7s-11.2-14.5-9.7-23.5l26.2-155.6L31.1 218.2c-6.5-6.4-8.7-15.9-5.9-24.5s10.3-14.9 19.3-16.3l153.2-22.6L266.3 13.5C270.4 5.2 278.7 0 287.9 0z"/>
                    <path fill="url(#star-rating-half-{{ star_id_prefix }}-{{ forloop.counter0 }})" d="M287.9 0c9.2 0 17.6 5.2 21.6 13.5l68.6 141.3 153.2 22.6c9 1.3 16.5 7.6 19.3 16.3s.5 18.1-5.9 24.5L433.6 328.4l26.2 155.6c1.5 9-2.2 18.1-9.6 23.5s-17.3 6-25.3 1.7l-137-73.2L151 509.1c-8.1 4.3-17.9 3.7-25.3-1.7s-11.2-14.5-9.7-23.5l26.2-155.6L31.1 218.2c-6.5-6.4-8.7-15.9-5.9-24.5s10.3-14.9 19.3-16.3l153.2-22.6L266.3 13.5C270.4 5.2 278.7 0 287.9 0z"/>
                </svg>
            {% else %}
                <svg xmlns="http://www.w3.org/2000/svg" class="{{ size_class|default:'size-4' }} text-gray-300 dark:text-neutral-600" viewBox="0 0 576 512" fill="currentColor" aria-hidden="true">
                    <path d="M287.9 0c9.2 0 17.6 5.2 21.6 13.5l68.6 141.3 153.2 22.6c9 1.3 16.5 7.6 19.3 16.3s.5 18.1-5.9 24.5L433.6 328.4l26.2 155.6c1.5 9-2.2 18.1-9.6 23.5s-17.3 6-25.3 1.7l-137-73.2L151 509.1c-8.1 4.3-17.9 3.7-25.3-1.7s-11.2-14.5-9.7-23.5l26.2-155.6L31.1 218.2c-6.5-6.4-8.7-15.9-5.9-24.5s10.3-14.9 19.3-16.3l153.2-22.6L266.3 13.5C270.4 5.2 278.7 0 287.9 0z"/>
                </svg>
            {% endif %}
        {% endwith %}
    {% endfor %}
</div>
